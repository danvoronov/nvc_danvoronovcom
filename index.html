<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дан Воронов - Дослідження ННС</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f8f8;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 2.2em;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
        }

        .section {
            margin-bottom: 25px;
        }

        .section p {
            margin-bottom: 10px;
        }

        a {
            color: #3498db;
            text-decoration: none;
            transition: color 0.3s ease, text-decoration 0.3s ease;
        }

        a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .divider {
            border-top: 1px solid #eee;
            margin: 30px 0;
        }

        .secondary-text {
            font-size: 0.9em;
            color: #666;
            padding-left: 20px;
            margin-top: 15px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Дослідження ННС</h1>

        <div class="section">
            <p>Про Маршалла Розенберга та його книги:
            <a href="rosenberg/">Еволюція Емпатії</a></p>

        <div class="divider"></div>

        <div class="section">
            <p><a href="https://danvoronov.com/">Dan Voronov - Основний сайт</a></p>
        </div>
    </div>
</body>
</html>
